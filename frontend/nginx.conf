# ============================================================================
# CodePilot AI — Nginx Configuration
# Serves the React SPA and proxies API requests to the Go backend.
# ============================================================================

server {
    listen 80;
    server_name _;

    # ---------- Root & Index ----------
    root /usr/share/nginx/html;
    index index.html;

    # ---------- Gzip Compression ----------
    # Compress text-based assets to reduce bandwidth by ~70%.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- API Proxy ----------
    # Forward all /api requests to the Go backend.
    # The upstream name "backend" matches the docker-compose service name,
    # which Docker DNS resolves automatically.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # Pass client information to the backend.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for real-time review updates).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings for long-running LLM requests.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ---------- Webhook Proxy ----------
    # GitHub webhook endpoint — same proxy config as /api.
    location /webhook {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Static Asset Caching ----------
    # Vite adds content hashes to filenames, so we can cache aggressively.
    # JS, CSS, images, and fonts are immutable once built.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- SPA Fallback ----------
    # For any route that doesn't match a static file or /api,
    # serve index.html so React Router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Health Check ----------
    # Lightweight endpoint for load balancers / orchestrators.
    location = /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
